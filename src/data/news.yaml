  text: "Our [new paper](https://saeed1262.github.io/projects/motionModel/) on Motion Modelling is now published at Computer Graphics Forum. Watch the [short](https://www.youtube.com/watch?v=jw0_aBPROGA&t=93s) and [long](https://www.youtube.com/watch?v=r9F74LcGC0A&t=689s) presentations."

- id: news-2020-movi-dataset
  date: "2020-03-06"
  text: "**MoVi**: We just published a BIG new dataset of human motion data. 9h mocap + 17h calibrated video + 7h of IMU + MoSh reconstructed body shape. Check the [website](http://biomotionlab.ca/movi/)."

- id: news-2019-yorku-vista
